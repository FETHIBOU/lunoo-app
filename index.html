<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUNOO</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #1a1a2e; }
        /* L'iframe prend 100% de l'écran, cachant qu'il s'agit d'un site imbriqué */
        iframe { border: none; width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbzNcmbGETtxTemUsbgmbEclM3jDWWUgCnUo3WbdyVXoOHYI1qBH5AeeifjEou04H1xT/exec" allow="camera; microphone; fullscreen"></iframe>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker PWA Activé !'))
                    .catch(err => console.log('Erreur SW :', err));
            });
        }
    </script>
</body>
</html>
